<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="width:240px;padding:20px;font-family:sans-serif;background:#f0f4ff;margin:0;">
  <h3 style="margin:0 0 16px;color:#1B4F9B;font-size:15px;">📧 Coller Mail SF</h3>

  <button id="copyInfosBtn" style="width:100%;padding:12px;background:#fff;color:#1B4F9B;border:2px solid #1B4F9B;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:10px;">
    📋 Copier les infos SF
  </button>

  <button id="pasteBtn" style="width:100%;padding:12px;background:#1B4F9B;color:white;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;">
    📋 Coller le mail
  </button>

  <p id="status" style="font-size:12px;color:#666;margin-top:10px;text-align:center;min-height:16px;"></p>
  <button id="debugBtn" style="width:100%;padding:8px;background:#eee;color:#333;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:12px;margin-top:6px;">🔍 Debug éléments SF</button>
  <div id="debugOut" style="font-size:11px;color:#333;margin-top:8px;word-break:break-all;max-height:120px;overflow-y:auto;"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
